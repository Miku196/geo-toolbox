[plugin]
name = "volcanology"
version = "0.1.0"
description = "火山 — 火山灰扩散、熔岩流路径、灾害区划"

[ash]
default_plume_height_m = 5000.0
default_particle_density_kgm3 = 2500.0
default_grain_size_mm = 0.5

[lava]
default_effusion_rate_m3s = 500.0
default_viscosity_Pa_s = 5000.0
default_slope_degrees = 5.0

[dependencies]
cores = []

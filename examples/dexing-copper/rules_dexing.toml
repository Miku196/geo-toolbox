# 德兴铜矿生态修复评估 — 矿山专用碳密度参数
# 基于江西省德兴市亚热带湿润气候 + 铜矿废弃地特征

[plugin]
name = "dexing-copper-mine"
version = "0.1.0"
description = "德兴铜矿生态修复评估 — NDVI变化检测 + 碳汇计算"

# ── NDVI 阈值（铜矿区专用）──
[ndvi]
healthy_min = 0.55              # 亚热带健康森林 NDVI ≥ 0.55
degraded_max = 0.20             # 裸地/废石场 NDVI ≤ 0.20
improvement_threshold = 0.15    # NDVI差值 > 0.15 = 显著恢复
degradation_threshold = -0.10   # NDVI差值 < -0.10 = 显著退化

# ── 碳密度（tCO₂e/ha/yr）──
# 正值=排放 负值=碳汇
# 基于中国南方亚热带森林碳汇数据
[carbon]
source = "IPCC_2019_CN-Subtropical"
forest = -6.5                  # 亚热带常绿阔叶林碳汇（高于全球均值）
grassland = -1.5               # 矿区修复草地
wetland = -9.0                 # 湿地碳汇
cropland = 0.3                 # 农田低排放
built_up = 2.5                 # 工业/建筑用地
bare = 0.0                     # 裸地/采场（无碳汇）

# ── 报告配置 ──
[report]
template = "restoration-report.md.tera"
format = "markdown"

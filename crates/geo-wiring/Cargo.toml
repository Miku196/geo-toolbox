[package]
name = "geo-wiring"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Shared registry wiring for geo-cli and geo-server — registers all plugins and adapters"

[dependencies]
geo-core = { path = "../../core/geo-core" }
geo-registry = { path = "../../core/geo-registry", features = ["tokio-runtime"] }
geo-io = { path = "../../core/geo-io" }
geo-carbon-math = { path = "../../core/geo-carbon-math" }
geo-tile = { path = "../../core/geo-tile" }
geo-temporal = { path = "../../core/geo-temporal" }
geo-vector = { path = "../../core/geo-vector" }
geo-index = { path = "../../core/geo-index" }
geo-stats = { path = "../../core/geo-stats" }
geo-report = { path = "../../core/geo-report" }
geo-plugin-carbon = { path = "../../plugins/geo-plugin-carbon" }
geo-plugin-ecology = { path = "../../plugins/geo-plugin-ecology" }
geo-plugin-energy = { path = "../../plugins/geo-plugin-energy" }
geo-plugin-forestry = { path = "../../plugins/geo-plugin-forestry" }
geo-plugin-coastal = { path = "../../plugins/geo-plugin-coastal" }
geo-plugin-survey = { path = "../../plugins/geo-plugin-survey" }
geo-plugin-hydro = { path = "../../plugins/geo-plugin-hydro" }
geo-plugin-geohazard = { path = "../../plugins/geo-plugin-geohazard" }
geo-plugin-agri = { path = "../../plugins/geo-plugin-agri" }
geo-plugin-urban = { path = "../../plugins/geo-plugin-urban" }
geo-plugin-climate = { path = "../../plugins/geo-plugin-climate" }
geo-plugin-geomorph = { path = "../../plugins/geo-plugin-geomorph" }
geo-plugin-remote-sensing = { path = "../../plugins/geo-plugin-remote-sensing" }
geo-plugin-seismology = { path = "../../plugins/geo-plugin-seismology" }
geo-plugin-socioeconomic = { path = "../../plugins/geo-plugin-socioeconomic" }
geo-plugin-cryosphere = { path = "../../plugins/geo-plugin-cryosphere" }
geo-plugin-atmosphere = { path = "../../plugins/geo-plugin-atmosphere" }
geo-plugin-planetary = { path = "../../plugins/geo-plugin-planetary" }
geo-plugin-paleoclimate = { path = "../../plugins/geo-plugin-paleoclimate" }
geo-plugin-geology = { path = "../../plugins/geo-plugin-geology" }
geo-plugin-volcanology = { path = "../../plugins/geo-plugin-volcanology" }
geo-plugin-biodiversity = { path = "../../plugins/geo-plugin-biodiversity" }
geo-plugin-groundwater = { path = "../../plugins/geo-plugin-groundwater" }
geo-plugin-ocean = { path = "../../plugins/geo-plugin-ocean" }
geo-plugin-public-health = { path = "../../plugins/geo-plugin-public-health" }
geo-plugin-ecosystem-services = { path = "../../plugins/geo-plugin-ecosystem-services" }
geo-adapter-duckdb = { path = "../../adapters/geo-adapter-duckdb" }
geo-adapter-stac = { path = "../../adapters/geo-adapter-stac" }
geo-adapter-osm = { path = "../../adapters/geo-adapter-osm" }
geo-adapter-postgis = { path = "../../adapters/geo-adapter-postgis", optional = true }
geo-adapter-gee = { path = "../../adapters/geo-adapter-gee", optional = true }
geo-adapter-qgis = { path = "../../adapters/geo-adapter-qgis", optional = true }
geo-adapter-cad = { path = "../../adapters/geo-adapter-cad", optional = true }
geo-adapter-cli = { path = "../../adapters/geo-adapter-cli", optional = true }
geo-adapter-iot = { path = "../../adapters/geo-adapter-iot", optional = true }
tracing.workspace = true

[features]
default = []
postgis = ["geo-adapter-postgis"]
gee = ["geo-adapter-gee"]
qgis = ["geo-adapter-qgis"]
cad = ["geo-adapter-cad"]
gdal = ["geo-adapter-cli"]
iot = ["geo-adapter-iot"]

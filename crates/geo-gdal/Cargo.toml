[package]
name = "geo-gdal"
version.workspace = true
description = "GDAL raster and vector operations via subprocess or bindings: COG conversion, ogr2ogr, GCS→MinIO bridge"
edition.workspace = true

[features]
default = []
gdal-bindings = ["gdal"]

[dependencies]
geo-core = { path = "../geo-core" }
geo-store = { path = "../geo-store", optional = true }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
uuid.workspace = true
tracing.workspace = true
object_store = { workspace = true, optional = true }
gdal = { workspace = true, optional = true }

[package]
name = "geo-wasm"
version.workspace = true
description = "WebAssembly bindings for geo-toolbox — browser-side geospatial processing without data leaving the user's machine"
edition.workspace = true
license.workspace = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
geo-core = { path = "../../core/geo-core" }
geo-carbon-math = { path = "../../core/geo-carbon-math" }
geo-tile = { path = "../../core/geo-tile" }

wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { workspace = true }
serde_json = { workspace = true }
serde-wasm-bindgen = "0.6"

geo = { workspace = true }
geo-types = { workspace = true }

uuid = { workspace = true, features = ["v4", "js"] }
chrono = { workspace = true }
console_error_panic_hook = { version = "0.1", optional = true }
web-sys = { version = "0.3", features = ["console"] }
csv = { workspace = true }

rexie = "0.6"
wasm-bindgen-futures = "0.4"
rust_xlsxwriter = { workspace = true }

geo-temporal = { path = "../../core/geo-temporal" }
geo-vector = { path = "../../core/geo-vector" }
geo-index = { path = "../../core/geo-index" }
geo-stats = { path = "../../core/geo-stats" }
geo-report = { path = "../../core/geo-report" }
geo-plugin-carbon = { path = "../../plugins/geo-plugin-carbon" }
geo-plugin-ecology = { path = "../../plugins/geo-plugin-ecology" }
geo-plugin-energy = { path = "../../plugins/geo-plugin-energy" }
geo-plugin-forestry = { path = "../../plugins/geo-plugin-forestry" }
geo-plugin-coastal = { path = "../../plugins/geo-plugin-coastal" }
geo-plugin-survey = { path = "../../plugins/geo-plugin-survey" }

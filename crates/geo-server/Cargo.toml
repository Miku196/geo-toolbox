[package]
name = "geo-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HTTP API server for geo-toolbox — REST interface to all MCP tools"

[[bin]]
name = "geo-server"
path = "src/main.rs"

[dependencies]

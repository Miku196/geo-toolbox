[package]
name = "geo-store"
version.workspace = true
description = "Data backbone: PostGIS, TimescaleDB hypertables, MinIO/S3 object storage, and DVC integration"
edition.workspace = true

[features]
default = []
# TimescaleDB hypertable support
timescale = []
# MinIO / S3 / GCS object store integration
minio = ["dep:object_store"]

[dev-dependencies]
geo = { workspace = true }
criterion = { workspace = true, features = ["async_tokio"] }

[[bench]]
name = "batch_write"
harness = false

[dependencies]
geo-core = { path = "../geo-core" }
sqlx = { workspace = true, features = ["postgres", "runtime-tokio", "migrate", "uuid"] }
object_store = { workspace = true, optional = true }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
uuid.workspace = true

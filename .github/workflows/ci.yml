name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libsqlite3-dev libssl-dev pkg-config
      - name: Install system deps (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "GDAL on Windows CI: skipping --all-features path; using --features minimal check below"
          # GDAL C lib is pre-installed via OSGeo4W on some runners, but we use --all-features on linux only
      - name: Check all features (linux only - needs GDAL)
        if: runner.os == 'Linux'
        run: cargo check --workspace --all-features
      - name: Check selected features (windows - no GDAL on CI)
        if: runner.os == 'Windows'
        run: cargo check --workspace --no-default-features --features minimal,postgis,temporal,qgis,energy,duckdb
      - run: cargo check --workspace --no-default-features --features minimal

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libsqlite3-dev libssl-dev pkg-config
      - name: Install system deps (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cargo test --list 2>&1 || echo "test listing failed (may need GDAL); running what we can"
      - run: cargo test --workspace --no-fail-fast

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libsqlite3-dev libssl-dev pkg-config
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

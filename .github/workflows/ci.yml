name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Check
        run: cargo check --workspace --all-features

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-test-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-cargo-build-test-

      - name: Test
        run: cargo test --workspace --all-features

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-latest-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-latest-cargo-build-lint-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: ubuntu-latest-cargo-build-lint-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-latest-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-latest-cargo-build-cov-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: ubuntu-latest-cargo-build-cov-

      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info --summary-only 2>&1 | tee /tmp/cov-summary.txt

      - name: Coverage gate (PR must not decrease)
        if: github.event_name == 'pull_request'
        run: |
          HEAD_COV=$(awk '/^TOTAL/ { gsub("%",""); print int($NF) }' /tmp/cov-summary.txt 2>/dev/null || echo "0")
          echo "Head coverage: ${HEAD_COV}%"

          git fetch origin "+${{ github.base_ref }}:${{ github.base_ref }}" --depth=1 2>/dev/null || git fetch origin ${{ github.base_ref }} --depth=1
          mkdir -p base-cov
          git -C base-cov init
          git -C base-cov remote add origin "${{ github.server_url }}/${{ github.repository }}.git"
          git -C base-cov fetch origin "${{ github.event.pull_request.base.sha }}" --depth=1 2>/dev/null || git -C base-cov fetch origin ${{ github.base_ref }} --depth=1
          git -C base-cov checkout FETCH_HEAD
          cd base-cov
          cargo llvm-cov --workspace --all-features --summary-only 2>&1 | tee /tmp/base-cov-summary.txt
          BASE_COV=$(awk '/^TOTAL/ { gsub("%",""); print int($NF) }' /tmp/base-cov-summary.txt 2>/dev/null || echo "0")
          cd ..
          rm -rf base-cov
          
          echo "Base coverage: ${BASE_COV}% | Head coverage: ${HEAD_COV}%"
          if [ "$HEAD_COV" -lt "$BASE_COV" ]; then
            echo "❌ Coverage decreased: ${BASE_COV}% → ${HEAD_COV}%"
            echo "PRs must not decrease coverage."
            exit 1
          fi
          if [ "$HEAD_COV" -lt 45 ]; then
            echo "❌ Coverage below minimum gate: ${HEAD_COV}% < 45%"
            exit 1
          fi
          echo "✅ Coverage gate passed: ${HEAD_COV}% (base ${BASE_COV}%, min 45%)"

      - name: Coverage gate (main branch — min 45%)
        if: github.ref == 'refs/heads/main'
        run: |
          HEAD_COV=$(awk '/^TOTAL/ { gsub("%",""); print int($NF) }' /tmp/cov-summary.txt 2>/dev/null || echo "0")
          if [ "$HEAD_COV" -lt 45 ]; then
            echo "❌ Coverage below minimum gate (45%): ${HEAD_COV}%"
            exit 1
          fi
          echo "✅ Coverage: ${HEAD_COV}% ≥ 45%"

      - name: Coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: lcov.info

  coverage-issue:
    name: Create coverage issue
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --summary-only 2>&1 | tee /tmp/cov.txt

      - name: Create/update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const covText = fs.readFileSync('/tmp/cov.txt', 'utf8');
            const totalLine = covText.split('\n').find(l => l.startsWith('TOTAL'));
            const match = totalLine ? totalLine.match(/\d+(\.\d+)?%/g) : [];
            const pct = match ? match[match.length-1] : 'N/A';
            
            const body = `## 📊 Weekly Coverage Report\n\nCoverage: **${pct}**\n\nTarget: **45%**\n\n> Generated by scheduled CI run on \`${{ github.ref_name }}\``;
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['coverage-report'],
              state: 'open',
            });
            
            const existingIssue = issues.data.find(i => i.title.includes('Coverage Report'));
            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📊 Weekly Coverage Report',
                body: body,
                labels: ['coverage-report'],
              });
            }

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-latest-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-registry-

      - name: Run benchmarks (check compile only)
        run: cargo bench --no-run --workspace --all-features 2>&1 || echo "No benchmarks defined yet — skipping"

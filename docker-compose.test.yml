# Docker Compose for geo-toolbox integration tests.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   DATABASE_URL=postgres://geo:geo@localhost:5432/geo_test \
#   TIMESCALE_URL=postgres://geo:geo@localhost:5433/geo_ts \
#     cargo test -p geo-store -- --ignored
#   docker compose -f docker-compose.test.yml down

services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geo_test
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "geo", "-d", "geo_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: geo_ts
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "geo", "-d", "geo_ts"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO (optional — for minio feature tests)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
